<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Leo & Marina's Dino Birthday RSVP</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

  <header class="hero">
    <img
      src="./images/Twin tots celebrating under a sunny sky.png"
      alt="Leo and Marina"
      class="hero-img"
    />

    <div class="hero-overlay"></div>

    <div class="container hero-inner">
      <div class="hero-content">
        <p class="eyebrow">A prehistoric celebration</p>
        <h1>Leo & Marina’s Birthday Party</h1>
        <p class="hero-subtitle">
          Join us for a Yabba Dabba Doo day of cake, fun and adventures.
          The Twins are smashing their first birthday!
        </p>
        <a href="#rsvp" class="hero-button">RSVP Now</a>
      </div>
    </div>

    <div class="hero-wave"></div>
  </header>

  <main class="container">
    <section class="card">
      <h2>Come Celebrate With Us</h2>
      <p>
        We’re getting ready for a special birthday celebration and would love to have you with us.
      </p>
    </section>
  </main>

</body>
</html>
